<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" role="img" aria-label="proctree header">
  <title>proctree -- Process Tree Visualizer</title>
  <desc>Process tree visualization showing parent-child relationships with CPU/memory resource bars and zombie process detection</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="zombieGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="180" fill="url(#bg)" rx="8" ry="8"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#2c3e50" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="30" x2="400" y2="30"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="90" x2="400" y2="90"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
  </g>

  <!-- Tree connecting lines -->
  <g stroke="#4a6572" stroke-width="1.5" fill="none">
    <!-- root to children -->
    <path d="M 58 45 L 58 55 L 30 55 L 30 65"/>
    <path d="M 58 55 L 95 55 L 95 65"/>
    <path d="M 95 65 L 95 80"/>
    <!-- node1 child -->
    <path d="M 30 65 L 30 90"/>
    <path d="M 30 90 L 18 90 L 18 110"/>
    <!-- node2 child (zombie) -->
    <path d="M 95 80 L 125 80 L 125 95"/>
  </g>

  <!-- Root node: init [1] -->
  <rect x="25" y="28" width="65" height="22" rx="4" fill="#2c3e50" stroke="#3498db" stroke-width="1.5"/>
  <rect x="29" y="32" width="4" height="14" rx="1" fill="#2ecc71"/>
  <rect x="35" y="35" width="18" height="4" rx="1" fill="#27ae60"/>
  <rect x="35" y="41" width="14" height="3" rx="1" fill="#1a5276"/>
  <text x="55" y="43" font-family="monospace" font-size="6" fill="#ecf0f1" text-anchor="middle">[1]</text>

  <!-- Child node 1: bash [3042] -->
  <rect x="6" y="68" width="70" height="22" rx="4" fill="#2c3e50" stroke="#2ecc71" stroke-width="1.5"/>
  <rect x="10" y="72" width="5" height="14" rx="1" fill="#2ecc71"/>
  <rect x="17" y="75" width="22" height="4" rx="1" fill="#27ae60"/>
  <rect x="17" y="81" width="16" height="3" rx="1" fill="#1a5276"/>
  <text x="38" y="83" font-family="monospace" font-size="6" fill="#ecf0f1" text-anchor="middle">[3042]</text>

  <!-- Child node 2: python [18500] -->
  <rect x="72" y="68" width="70" height="22" rx="4" fill="#2c3e50" stroke="#f39c12" stroke-width="1.5"/>
  <rect x="76" y="72" width="6" height="14" rx="1" fill="#f39c12"/>
  <rect x="84" y="75" width="26" height="4" rx="1" fill="#e67e22"/>
  <rect x="84" y="81" width="20" height="3" rx="1" fill="#1a5276"/>
  <text x="107" y="83" font-family="monospace" font-size="6" fill="#ecf0f1" text-anchor="middle">[18500]</text>

  <!-- Grandchild: ssh [22110] -->
  <rect x="5" y="108" width="60" height="20" rx="4" fill="#2c3e50" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="9" y="112" width="4" height="12" rx="1" fill="#2ecc71"/>
  <rect x="15" y="114" width="18" height="4" rx="1" fill="#27ae60"/>
  <rect x="15" y="120" width="12" height="3" rx="1" fill="#1a5276"/>
  <text x="32" y="122" font-family="monospace" font-size="5" fill="#ecf0f1" text-anchor="middle">[22110]</text>

  <!-- Zombie node: defunct [4521] -->
  <rect x="100" y="93" width="72" height="22" rx="4" fill="#2c3e50" stroke="#9b59b6" stroke-width="2"/>
  <rect x="104" y="97" width="4" height="14" rx="1" fill="#9b59b6"/>
  <rect x="110" y="100" width="24" height="4" rx="1" fill="#8e44ad"/>
  <rect x="110" y="106" width="18" height="3" rx="1" fill="#1a5276"/>
  <text x="136" y="108" font-family="monospace" font-size="5" fill="#9b59b6" text-anchor="middle">[Z]</text>

  <!-- Legend area -->
  <g transform="translate(195, 15)">
    <text x="0" y="12" font-family="monospace" font-size="8" fill="#ecf0f1" font-weight="bold">proctree</text>
    <text x="0" y="26" font-family="monospace" font-size="7" fill="#7f8c8d">Process Tree Visualizer</text>

    <!-- CPU bar legend -->
    <text x="0" y="42" font-family="monospace" font-size="6" fill="#95a5a6">CPU</text>
    <rect x="22" y="36" width="8" height="6" rx="1" fill="#2ecc71"/>
    <rect x="32" y="36" width="8" height="6" rx="1" fill="#2ecc71"/>
    <rect x="42" y="36" width="8" height="6" rx="1" fill="#f39c12"/>
    <rect x="52" y="36" width="8" height="6" rx="1" fill="#e74c3c"/>
    <rect x="62" y="36" width="4" height="6" rx="1" fill="#34495e"/>

    <!-- MEM bar legend -->
    <text x="0" y="54" font-family="monospace" font-size="6" fill="#95a5a6">MEM</text>
    <rect x="22" y="48" width="12" height="6" rx="1" fill="#27ae60"/>
    <rect x="36" y="48" width="8" height="6" rx="1" fill="#f39c12"/>
    <rect x="46" y="48" width="10" height="6" rx="1" fill="#e74c3c"/>
    <rect x="58" y="48" width="8" height="6" rx="1" fill="#34495e"/>

    <!-- ZOMBIE indicator legend -->
    <rect x="22" y="60" width="8" height="8" rx="2" fill="#9b59b6"/>
    <text x="34" y="68" font-family="monospace" font-size="6" fill="#9b59b6">ZOMBIE</text>

    <!-- ORPHAN indicator -->
    <rect x="90" y="60" width="8" height="8" rx="2" fill="#f39c12"/>
    <text x="102" y="68" font-family="monospace" font-size="6" fill="#f39c12">ORPHAN</text>
  </g>

  <!-- Divider line -->
  <line x1="185" y1="12" x2="185" y2="168" stroke="#34495e" stroke-width="1"/>

  <!-- Right side stats panel -->
  <g transform="translate(200, 90)">
    <text x="0" y="0" font-family="monospace" font-size="7" fill="#7f8c8d">Zombies: </text>
    <text x="50" y="0" font-family="monospace" font-size="7" fill="#9b59b6" font-weight="bold">2</text>

    <text x="0" y="14" font-family="monospace" font-size="7" fill="#7f8c8d">Orphans: </text>
    <text x="50" y="14" font-family="monospace" font-size="7" fill="#f39c12" font-weight="bold">0</text>

    <text x="0" y="28" font-family="monospace" font-size="7" fill="#7f8c8d">CPU >80%: </text>
    <text x="55" y="28" font-family="monospace" font-size="7" fill="#e74c3c" font-weight="bold">3</text>

    <text x="0" y="42" font-family="monospace" font-size="7" fill="#7f8c8d">MEM >80%: </text>
    <text x="55" y="42" font-family="monospace" font-size="7" fill="#e74c3c" font-weight="bold">1</text>
  </g>

  <!-- Bottom status bar -->
  <rect x="0" y="168" width="400" height="12" fill="#1a252f" rx="0" ry="0"/>
  <text x="8" y="177" font-family="monospace" font-size="6" fill="#34495e">proctree show --sort-by memory --color-threshold 70%</text>

  <!-- Corner decoration -->
  <text x="390" y="177" font-family="monospace" font-size="6" fill="#34495e" text-anchor="end">psutil + rich</text>
</svg>
