<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" role="img" aria-label="proctree header">
  <title>proctree -- Process Tree Visualizer</title>
  <desc>Process tree visualization showing parent-child relationships with CPU/memory resource bars and zombie process detection</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="cpuGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <linearGradient id="cpuYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    <linearGradient id="cpuRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="zombieGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)" rx="10"/>

  <!-- ==================== LEFT: TREE VISUALIZATION (0-480) ==================== -->

  <!-- Tree connectors -->
  <g stroke="#4a6572" stroke-width="1.5" fill="none">
    <!-- Root [1] to children -->
    <path d="M 85 95 L 85 110 L 40 110 L 40 135"/>
    <path d="M 85 110 L 135 110 L 135 135"/>
    <!-- Child [3042] to grandchildren -->
    <path d="M 40 135 L 40 175"/>
    <path d="M 40 175 L 20 175 L 20 220"/>
    <path d="M 40 175 L 65 175 L 65 220"/>
    <!-- Child [18500] to zombie -->
    <path d="M 135 135 L 135 175"/>
    <path d="M 135 175 L 180 175 L 180 220"/>
  </g>

  <!-- Root node: init [1] -->
  <g transform="translate(35, 65)">
    <rect width="100" height="36" rx="5" fill="#1a252f" stroke="#3498db" stroke-width="2"/>
    <!-- CPU bar -->
    <rect x="8" y="8" width="5" height="20" rx="2" fill="url(#cpuGreen)"/>
    <rect x="15" y="12" width="30" height="5" rx="1" fill="#27ae60"/>
    <rect x="15" y="22" width="22" height="4" rx="1" fill="#1a5276"/>
    <!-- Label -->
    <text x="50" y="24" font-family="monospace" font-size="11" fill="#ecf0f1" text-anchor="middle">init [1]</text>
  </g>

  <!-- Child 1: bash [3042] -->
  <g transform="translate(5, 138)">
    <rect width="90" height="34" rx="5" fill="#1a252f" stroke="#2ecc71" stroke-width="2"/>
    <rect x="7" y="7" width="4" height="20" rx="1" fill="url(#cpuGreen)"/>
    <rect x="14" y="11" width="26" height="4" rx="1" fill="#27ae60"/>
    <rect x="14" y="20" width="20" height="3" rx="1" fill="#1a5276"/>
    <text x="45" y="22" font-family="monospace" font-size="10" fill="#ecf0f1" text-anchor="middle">bash [3042]</text>
  </g>

  <!-- Child 2: python [18500] -->
  <g transform="translate(100, 138)">
    <rect width="95" height="34" rx="5" fill="#1a252f" stroke="#f39c12" stroke-width="2"/>
    <rect x="7" y="7" width="6" height="20" rx="2" fill="url(#cpuYellow)"/>
    <rect x="16" y="11" width="32" height="4" rx="1" fill="#e67e22"/>
    <rect x="16" y="20" width="26" height="3" rx="1" fill="#1a5276"/>
    <text x="48" y="22" font-family="monospace" font-size="10" fill="#ecf0f1" text-anchor="middle">python [18500]</text>
  </g>

  <!-- Grandchild: ssh [22110] -->
  <g transform="translate(0, 223)">
    <rect width="70" height="28" rx="4" fill="#1a252f" stroke="#27ae60" stroke-width="1.5"/>
    <rect x="6" y="6" width="4" height="16" rx="1" fill="url(#cpuGreen)"/>
    <rect x="13" y="9" width="20" height="4" rx="1" fill="#27ae60"/>
    <rect x="13" y="17" width="14" height="3" rx="1" fill="#1a5276"/>
    <text x="35" y="19" font-family="monospace" font-size="8" fill="#ecf0f1" text-anchor="middle">ssh [22110]</text>
  </g>

  <!-- Grandchild 2: ruby [22115] -->
  <g transform="translate(45, 223)">
    <rect width="65" height="28" rx="4" fill="#1a252f" stroke="#27ae60" stroke-width="1.5"/>
    <rect x="6" y="6" width="3" height="16" rx="1" fill="url(#cpuGreen)"/>
    <rect x="12" y="9" width="18" height="4" rx="1" fill="#27ae60"/>
    <rect x="12" y="17" width="12" height="3" rx="1" fill="#1a5276"/>
    <text x="33" y="19" font-family="monospace" font-size="8" fill="#ecf0f1" text-anchor="middle">ruby [15]</text>
  </g>

  <!-- Zombie: defunct [Z] -->
  <g transform="translate(145, 223)">
    <rect width="80" height="32" rx="5" fill="#1a252f" stroke="#9b59b6" stroke-width="2.5"/>
    <rect x="7" y="7" width="5" height="18" rx="2" fill="url(#zombieGrad)"/>
    <rect x="15" y="11" width="26" height="4" rx="1" fill="#8e44ad"/>
    <rect x="15" y="19" width="18" height="3" rx="1" fill="#1a5276"/>
    <text x="40" y="25" font-family="monospace" font-size="9" fill="#9b59b6" text-anchor="middle">defunct [Z]</text>
  </g>

  <!-- ==================== DIVIDER (480-510) ==================== -->
  <line x1="500" y1="25" x2="500" y2="275" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- ==================== RIGHT: INFO PANEL (530-780) ==================== -->

  <!-- Title -->
  <text x="540" y="55" font-family="monospace" font-size="28" fill="#ecf0f1" font-weight="bold">proctree</text>

  <!-- Subtitle -->
  <text x="540" y="80" font-family="monospace" font-size="14" fill="#7f8c8d">Process Tree Visualizer</text>

  <!-- CPU section -->
  <g transform="translate(540, 105)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#95a5a6">CPU</text>
    <g transform="translate(50, -10)">
      <rect x="0" y="0" width="12" height="10" rx="2" fill="url(#cpuGreen)"/>
      <rect x="16" y="0" width="12" height="10" rx="2" fill="url(#cpuGreen)"/>
      <rect x="32" y="0" width="12" height="10" rx="2" fill="url(#cpuYellow)"/>
      <rect x="48" y="0" width="12" height="10" rx="2" fill="url(#cpuRed)"/>
      <rect x="64" y="0" width="8" height="10" rx="2" fill="#34495e"/>
    </g>
    <text x="130" y="0" font-family="monospace" font-size="10" fill="#7f8c8d">green &lt; 70%</text>
    <text x="130" y="14" font-family="monospace" font-size="10" fill="#7f8c8d">yellow ≥ 70%</text>
    <text x="130" y="28" font-family="monospace" font-size="10" fill="#7f8c8d">red ≥ 80%</text>
  </g>

  <!-- Memory section -->
  <g transform="translate(540, 165)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#95a5a6">MEM</text>
    <g transform="translate(50, -10)">
      <rect x="0" y="0" width="16" height="10" rx="2" fill="url(#memGrad)"/>
      <rect x="20" y="0" width="12" height="10" rx="2" fill="url(#cpuYellow)"/>
      <rect x="36" y="0" width="14" height="10" rx="2" fill="url(#cpuRed)"/>
      <rect x="54" y="0" width="10" height="10" rx="2" fill="#34495e"/>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(540, 210)">
    <!-- Zombie -->
    <rect x="0" y="0" width="18" height="18" rx="3" fill="#9b59b6"/>
    <text x="26" y="14" font-family="monospace" font-size="12" fill="#9b59b6">Zombie</text>

    <!-- Orphan -->
    <rect x="100" y="0" width="18" height="18" rx="3" fill="#f39c12"/>
    <text x="126" y="14" font-family="monospace" font-size="12" fill="#f39c12">Orphan</text>
  </g>

  <!-- Stats box -->
  <g transform="translate(540, 245)">
    <rect x="0" y="0" width="220" height="35" rx="5" fill="#1a252f" stroke="#2c3e50"/>
    <text x="15" y="23" font-family="monospace" font-size="11" fill="#7f8c8d">847 processes</text>
    <line x1="100" y1="8" x2="100" y2="28" stroke="#34495e" stroke-width="1"/>
    <text x="115" y="15" font-family="monospace" font-size="10" fill="#9b59b6">Z: 3</text>
    <text x="115" y="28" font-family="monospace" font-size="10" fill="#f39c12">O: 0</text>
    <line x1="160" y1="8" x2="160" y2="28" stroke="#34495e" stroke-width="1"/>
    <text x="175" y="15" font-family="monospace" font-size="10" fill="#e74c3c">CPU↑4</text>
    <text x="175" y="28" font-family="monospace" font-size="10" fill="#e74c3c">MEM↑2</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="280" width="800" height="20" fill="#1a252f" rx="0"/>
  <text x="20" y="294" font-family="monospace" font-size="9" fill="#34495e">proctree show --sort-by memory</text>
  <text x="780" y="294" font-family="monospace" font-size="9" fill="#34495e" text-anchor="end">psutil + rich</text>
</svg>